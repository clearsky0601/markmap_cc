<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- App background -->
    <linearGradient id="bg" x1="180" y1="120" x2="850" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8FDFF"/>
      <stop offset="0.45" stop-color="#EAF8FF"/>
      <stop offset="1" stop-color="#DDF1FF"/>
    </linearGradient>

    <!-- Glass highlight -->
    <radialGradient id="glass" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(335 220) rotate(51.2) scale(560 420)">
      <stop offset="0" stop-color="white" stop-opacity="0.95"/>
      <stop offset="0.42" stop-color="white" stop-opacity="0.42"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </radialGradient>

    <!-- Main node gradient -->
    <linearGradient id="mainNode" x1="336" y1="390" x2="520" y2="570" gradientUnits="userSpaceOnUse">
      <stop stop-color="#39A9FF"/>
      <stop offset="1" stop-color="#5867F2"/>
    </linearGradient>

    <!-- Blue branch gradient -->
    <linearGradient id="blueLine" x1="460" y1="494" x2="760" y2="494" gradientUnits="userSpaceOnUse">
      <stop stop-color="#399DFF"/>
      <stop offset="1" stop-color="#2FD5E8"/>
    </linearGradient>

    <!-- Green branch gradient -->
    <linearGradient id="greenLine" x1="462" y1="410" x2="760" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#48CFEF"/>
      <stop offset="1" stop-color="#35E0B8"/>
    </linearGradient>

    <!-- Purple branch gradient -->
    <linearGradient id="purpleLine" x1="462" y1="570" x2="760" y2="715" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6672F4"/>
      <stop offset="1" stop-color="#A674FF"/>
    </linearGradient>

    <!-- Node gradients -->
    <linearGradient id="nodeBlue" x1="640" y1="430" x2="790" y2="540" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3BA8FF"/>
      <stop offset="1" stop-color="#1ECBE3"/>
    </linearGradient>

    <linearGradient id="nodeGreen" x1="640" y1="250" x2="795" y2="365" gradientUnits="userSpaceOnUse">
      <stop stop-color="#42E7C5"/>
      <stop offset="1" stop-color="#25C9E8"/>
    </linearGradient>

    <linearGradient id="nodePurple" x1="640" y1="640" x2="795" y2="755" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7C79FF"/>
      <stop offset="1" stop-color="#B47AFF"/>
    </linearGradient>

    <!-- Soft shadow -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="34" flood-color="#6BAFE8" flood-opacity="0.22"/>
    </filter>

    <filter id="innerGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feBlend in="SourceGraphic" in2="blur" mode="screen"/>
    </filter>

    <!-- Mask for rounded square -->
    <clipPath id="roundClip">
      <rect x="96" y="96" width="832" height="832" rx="220"/>
    </clipPath>
  </defs>

  <!-- Rounded iOS-style app icon base -->
  <rect x="96" y="96" width="832" height="832" rx="220" fill="url(#bg)" filter="url(#softShadow)"/>

  <g clip-path="url(#roundClip)">
    <!-- Glass layer -->
    <rect x="96" y="96" width="832" height="832" rx="220" fill="url(#glass)"/>

    <!-- Very subtle bottom tint -->
    <ellipse cx="512" cy="900" rx="430" ry="180" fill="#89D9FF" opacity="0.12"/>

    <!-- Top-left shine -->
    <path d="M190 255C235 150 355 120 470 128C340 172 260 245 222 350C205 340 193 305 190 255Z" fill="white" opacity="0.38"/>
  </g>

  <!-- Mind map symbol -->
  <g filter="url(#innerGlow)">
    <!-- Branches -->
    <path d="M455 492H675" stroke="url(#blueLine)" stroke-width="42" stroke-linecap="round"/>

    <path d="M455 482C528 482 527 345 610 345H684" stroke="url(#greenLine)" stroke-width="42" stroke-linecap="round" stroke-linejoin="round"/>

    <path d="M455 505C535 505 524 670 615 670H684" stroke="url(#purpleLine)" stroke-width="42" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Nodes -->
    <circle cx="415" cy="496" r="72" fill="url(#mainNode)"/>

    <rect x="665" y="427" width="176" height="92" rx="46" fill="url(#nodeBlue)"/>
    <rect x="665" y="299" width="176" height="92" rx="46" fill="url(#nodeGreen)"/>
    <rect x="665" y="625" width="176" height="92" rx="46" fill="url(#nodePurple)"/>

    <!-- Small highlights -->
    <circle cx="386" cy="462" r="21" fill="white" opacity="0.28"/>
    <rect x="700" y="319" width="72" height="16" rx="8" fill="white" opacity="0.28"/>
    <rect x="700" y="447" width="72" height="16" rx="8" fill="white" opacity="0.22"/>
    <rect x="700" y="645" width="72" height="16" rx="8" fill="white" opacity="0.22"/>
  </g>

  <!-- Thin border for iOS-like glass edge -->
  <rect x="97.5" y="97.5" width="829" height="829" rx="218.5" stroke="white" stroke-width="3" opacity="0.8"/>
  <rect x="101" y="101" width="822" height="822" rx="216" stroke="#BDEBFF" stroke-width="2" opacity="0.35"/>
</svg>
